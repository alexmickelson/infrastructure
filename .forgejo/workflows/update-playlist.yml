name: Manage Jellyfin Playlists
on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"
jobs:
  update-repo:
    uses: ./.forgejo/workflows/update-repo.yml
    runs-on: home-server
  run-python:
    runs-on: home-server
    steps:
    - name: Run Python script
      env:
        JELLYFIN_USER: ${{ secrets.JELLYFIN_USER }}
        JELLYFIN_PASSWORD: ${{ secrets.JELLYFIN_PASSWORD }}
      working-directory: /home/forgejo-runner/infrastructure
      run: |
        docker build -t jellyfin_management -f jellyfin/Dockerfile .
        docker run --rm \
        -e JELLYFIN_USER=$JELLYFIN_USER \
        -e JELLYFIN_PASSWORD=$JELLYFIN_PASSWORD \
          jellyfin_management \
            -m jellyfin.update_all_songs_playlist
        docker run --rm \
        -e JELLYFIN_USER=$JELLYFIN_USER \
        -e JELLYFIN_PASSWORD=$JELLYFIN_PASSWORD \
          jellyfin_management \
            -m jellyfin.update_unindexed

  notify-on-failure:
    runs-on: home-server
    needs: run-python
    if: failure()
    uses: ./.forgejo/workflows/notify-ntfy.yml
    secrets:
      NTFY_CHANNEL: ${{ secrets.NTFY_CHANNEL }}
    with:
      title: "Jellyfin Playlist Update Failed"
      message: |
        Failed to update Jellyfin playlists
      action_url: "https://git.alexmickelson.guru/${{ forgejo.repository }}/actions/runs/${{ forgejo.run_number }}"
      priority: "high"
      tags: "rotating_light,jellyfin"
