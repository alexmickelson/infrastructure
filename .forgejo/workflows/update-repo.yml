name: Update Repository
on:
  workflow_call:
jobs:
  update-repo-folder:
    runs-on: [home-server]
    steps:
      - name: checkout repo
        working-directory: /home/forgejo-runner
        run: |
          if [ -d "infrastructure" ]; then
            cd infrastructure
            echo "Infrastructure folder exists. Resetting to the most recent commit."
            git reset --hard HEAD
            git pull https://x-access-token:${{ secrets.FORGEJO_TOKEN }}@git.alexmickelson.guru/${{ forgejo.repository }} $(git rev-parse --abbrev-ref HEAD)
          else
            git clone https://x-access-token:${{ secrets.FORGEJO_TOKEN }}@git.alexmickelson.guru/${{ forgejo.repository }}.git
          fi
