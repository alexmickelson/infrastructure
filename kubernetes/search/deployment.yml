apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: searxng
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: searxng
  template:
    metadata:
      labels:
        app: searxng
    spec:
      containers:
        - name: searxng
          image: docker.io/searxng/searxng:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: SEARXNG_BASE_URL
              value: "https://search.alexmickelson.guru/"
            - name: SEARXNG_PORT
              value: "8080"
              # kubectl create secret generic searxng-secret --from-literal=secret-key=$(openssl rand -hex 32) -n searxng
              # kubectl get secret searxng-secret -n searxng -o jsonpath='{.data.secret-key}' | base64 -d
            - name: SEARXNG_SECRET
              valueFrom:
                secretKeyRef:
                  name: searxng-secret
                  key: secret-key
          volumeMounts:
            - name: config
              mountPath: /etc/searxng
            - name: data
              mountPath: /var/cache/searxng
      volumes:
        - name: config
          hostPath:
            path: /data/searxng
            type: DirectoryOrCreate
        - name: data
          hostPath:
            path: /data/searxng-data
            type: DirectoryOrCreate
