# not using right now
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-other-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/alexmickelson/infrastructure
    targetRevision: HEAD
    path: kubernetes/argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
