      - name: minecraft-cobblemon
        image: itzg/minecraft-server:java21
        stdin: true
        tty: true
        env:
        - name: EULA
          value: "true"
        - name: TYPE
          value: "AUTO_CURSEFORGE"
        - name: CF_SLUG
          value: "cobbleverse-cobblemon"
        - name: CF_MODPACK_ZIP
          value: "/modpacks/COBBLEVERSE-1.7.30-CF.zip"
        - name: CF_API_KEY
          value: "$CF_API_KEY"
        - name: MEMORY
          value: "4G"
        - name: SERVER_PORT
          value: "2222"
        - name: RCON_PORT
          value: "25576"
        - name: CF_OVERRIDES_EXCLUSIONS
          value: |
            # Not applicable for server side
            shaderpacks/**
            resourcepacks/**
        volumeMounts:
        - name: cobblemon-data
          mountPath: /data
        - name: modpacks
          mountPath: /modpacks
          readOnly: true
        resources:
          requests:
            memory: "4Gi"
          limits:
            memory: "6Gi"
      volumes:
      - name: minecraft-data
        hostPath:
          path: /data/minecraft/data
          type: DirectoryOrCreate
      - name: modpacks
        hostPath:
          path: /data/minecraft/modpacks
          type: DirectoryOrCreate
      - name: tailscale-data
        hostPath:
          path: /data/minecraft/tailscale
          type: DirectoryOrCreate
      - name: dev-tun
        hostPath:
          path: /dev/net/tun
          type: CharDevice
      - name: cobblemon-data
        hostPath:
          path: /data/minecraft/cobblemon-data
          type: DirectoryOrCreate
