apiVersion: v1
kind: Namespace
metadata:
  name: minecraft
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minecraft
  namespace: minecraft
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: minecraft
  template:
    metadata:
      labels:
        app: minecraft
    spec:
      containers:
      # - name: minecraft-cobblemon
      #   image: itzg/minecraft-server:java21
      #   stdin: true
      #   tty: true
      #   env:
      #   - name: EULA
      #     value: "true"
      #   - name: TYPE
      #     value: "AUTO_CURSEFORGE"
      #   - name: CF_SLUG
      #     value: "cobbleverse-cobblemon"
      #   - name: CF_MODPACK_ZIP
      #     value: "/modpacks/COBBLEVERSE-1.7.30-CF.zip"
      #   - name: CF_API_KEY
      #     value: "$CF_API_KEY"
      #   - name: MEMORY
      #     value: "4G"
      #   - name: SERVER_PORT
      #     value: "2222"
      #   - name: RCON_PORT
      #     value: "25576"
      #   - name: CF_OVERRIDES_EXCLUSIONS
      #     value: |
      #       # Not applicable for server side
      #       shaderpacks/**
      #       resourcepacks/**
      #   volumeMounts:
      #   - name: cobblemon-data
      #     mountPath: /data
      #   - name: modpacks
      #     mountPath: /modpacks
      #     readOnly: true
      #   resources:
      #     requests:
      #       memory: "4Gi"
      #     limits:
      #       memory: "6Gi"
      - name: minecraft-create
        image: itzg/minecraft-server:java21
        stdin: true
        tty: true
        env:
        - name: EULA
          value: "true"
        - name: TYPE
          value: "AUTO_CURSEFORGE"
        - name: CF_SLUG
          value: "create-ultimate-selection-2"
        - name: CF_API_KEY
          value: "$CF_API_KEY"
        - name: MEMORY
          value: "6G"
        - name: SERVER_PORT
          value: "2222"
        - name: RCON_PORT
          value: "25576"
        - name: CF_OVERRIDES_EXCLUSIONS
          value: |
            # Not applicable for server side
            shaderpacks/**
            resourcepacks/**
        volumeMounts:
        - name: create-data
          mountPath: /data
        resources:
          requests:
            memory: "6Gi"
          limits:
            memory: "8Gi"
      volumes:
      - name: create-data
        hostPath:
          path: /data/minecraft/create-data
          type: DirectoryOrCreate
