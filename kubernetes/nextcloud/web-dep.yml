apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextcloud-web
  namespace: nextcloud
  labels:
    app: nextcloud-web
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: nextcloud-web
  template:
    metadata:
      labels:
        app: nextcloud-web
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: nextcloud
          image: nextcloud:34
          environment:
            - TZ=America/Denver
            - OVERWRITEPROTOCOL=https
            - MYSQL_PASSWORD=slkdnflksnelkfnsdweoinv
            - MYSQL_DATABASE=nextcloud
            - MYSQL_USER=nextcloud
            - MYSQL_HOST=nextcloud-db
          volumeMounts:
            - name: nextcloud-www
              mountPath: /var/www/html
            - name: music
              mountPath: /music
            - name: movies
              mountPath: /movies
            - name: tvshows
              mountPath: /tvshows
            - name: shared
              mountPath: /shared
            - name: audiobooks
              mountPath: /audiobooks
          ports:
            - containerPort: 80
              name: http
      volumes:
        - name: nextcloud-www
          hostPath:
            path: /data/nextcloud/html
            type: DirectoryOrCreate
        - name: music
          hostPath:
            path: /data/media/music
            type: DirectoryOrCreate
        - name: movies
          hostPath:
            path: /data/media/movies
            type: DirectoryOrCreate
        - name: tvshows
          hostPath:
            path: /data/media/tvshows
            type: DirectoryOrCreate
        - name: shared
          hostPath:
            path: /data/media/shared
            type: DirectoryOrCreate
        - name: audiobooks
          hostPath:
            path: /data/media/audiobooks
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: nextcloud-svc
  namespace: nextcloud
  labels:
    app: nextcloud-web
spec:
  selector:
    app: nextcloud-web
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nextcloud-web-route
  namespace: nextcloud
spec:
  parentRefs:
    - name: envoy-gateway
      namespace: envoy-gateway-ingress
  hostnames:
    - next.alexmickelson.guru
  rules:
    - backendRefs:
        - name: nextcloud-svc
          port: 80
      matches:
        - path:
            type: PathPrefix
            value: /
