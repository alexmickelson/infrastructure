apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo-web
  namespace: forgejo
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: forgejo-web
  template:
    metadata:
      labels:
        app: forgejo-web
    spec:
      containers:
        - name: forgejo
          image: codeberg.org/forgejo/forgejo:16@sha256:9b8f02e896b1151ea60da05cf3e11fc7bd1c432dc6becee75ceb420f3d162b97
          ports:
            - containerPort: 3000
            - containerPort: 22
          env:
            - name: USER_UID
              value: "1000"
            - name: USER_GID
              value: "1000"
            - name: FORGEJO__database__DB_TYPE
              value: "postgres"
            - name: FORGEJO__database__HOST
              value: "forgejo-db-svc:5432"
            - name: FORGEJO__database__NAME
              value: "forgejo"
            - name: FORGEJO__database__USER
              value: "forgejo"
            - name: FORGEJO__database__PASSWD
              value: CHANGE_ME_GENERATE_STRONG_PASSWORD
            - name: FORGEJO__server__PROTOCOL
              value: "http"
            - name: FORGEJO__server__DOMAIN
              value: "git.alexmickelson.guru"
            - name: FORGEJO__server__ROOT_URL
              value: "https://git.alexmickelson.guru/"
            - name: FORGEJO__server__PUBLIC_URL_DETECTION
              value: "auto"
            - name: FORGEJO__server__LOCAL_ROOT_URL
              value: "http://forgejo-web-svc.forgejo.svc.cluster.local:3000/"
            - name: FORGEJO__server__SSH_DOMAIN
              value: "forgejo-forgejo-ssh-svc.beefalo-newton.ts.net"
            - name: FORGEJO__server__SSH_PORT
              value: "22"
            # security
            - name: FORGEJO__service__ENABLE_BASIC_AUTHENTICATION
              value: "false"
            - name: FORGEJO__service__DISABLE_REGISTRATION
              value: "true"
            - name: FORGEJO__service__ALLOW_ONLY_EXTERNAL_REGISTRATION
              value: "false"
            - name: FORGEJO__ui__DEFAULT_THEME
              value: "forgejo-dark"
            - name: FORGEJO__ui__THEMES
              value: "forgejo-dark"
          volumeMounts:
            - name: forgejo-data
              mountPath: /data
            - name: timezone
              mountPath: /etc/timezone
              readOnly: true
            - name: localtime
              mountPath: /etc/localtime
              readOnly: true
            - name: landing-page
              mountPath: /data/gitea/templates/home.tmpl
              subPath: home.tmpl
              readOnly: true
            - name: landing-page
              mountPath: /data/gitea/public/assets/css/custom-landing.css
              subPath: custom-landing.css
              readOnly: true
            - name: landing-page
              mountPath: /data/gitea/public/assets/js/custom-landing.js
              subPath: custom-landing.js
              readOnly: true
      volumes:
        - name: forgejo-data
          hostPath:
            path: /data/forgejo/data
            type: DirectoryOrCreate
        - name: timezone
          hostPath:
            path: /etc/timezone
        - name: localtime
          hostPath:
            path: /etc/localtime
        - name: landing-page
          configMap:
            name: forgejo-landing-page
---
apiVersion: v1
kind: Service
metadata:
  name: forgejo-ssh-svc
  namespace: forgejo
  annotations:
    tailscale.com/expose: "true"
spec:
  ports:
    - name: ssh
      port: 22
      targetPort: 22
  selector:
    app: forgejo-web
---
apiVersion: v1
kind: Service
metadata:
  name: forgejo-web-svc
  namespace: forgejo
spec:
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  selector:
    app: forgejo-web
---
