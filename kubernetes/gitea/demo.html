<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alex Mickelson - Landing Page Demo</title>
    <link rel="stylesheet" href="landingpage.css" />
    <style>
      body {
        margin: 0;
        padding: 0;
      }
    </style>
  </head>
  <body>
    <div id="alex-landing">
      <section class="hero">
        <div class="hero-inner">
          <h1>Alex Mickelson</h1>
        </div>
      </section>

      <section class="projects-section">
        <div class="section-header">
          <h2>Recent Projects</h2>
        </div>
        <div id="repo-grid" class="repo-grid">
          <!-- Repos will be populated by JavaScript -->
        </div>
      </section>

      <section class="heatmap-section">
        <div class="section-header">
          <h2>Activity</h2>
        </div>
        <div id="activity-heatmap" class="activity-heatmap">
          <!-- Heatmap will be populated by JavaScript -->
        </div>
      </section>

      <section class="github-link-section">
        <div class="github-link-container">
          <p>Want to see more?</p>
          <a
            href="https://github.com/alexmickelson"
            target="_blank"
            rel="noopener noreferrer"
            class="github-link"
            ><svg
              class="github-icon"
              viewBox="0 0 16 16"
              width="24"
              height="24"
              fill="currentColor"
              aria-hidden="true"
            >
              <path
                d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"
              ></path></svg
            >Check out more on GitHub →</a
          >
        </div>
      </section>

      <section class="activity-section">
        <div class="section-header">
          <h2>Recent Activity</h2>
          <a href="#" class="view-all-link">View full profile →</a>
        </div>
        <div id="activity-feed" class="activity-feed">
          <!-- Activity will be populated by JavaScript -->
        </div>
      </section>
    </div>

    <script>
      // Mock data for demo purposes
      const mockRepos = [
        {
          shortName: "infrastructure",
          repoName: "alexmickelson/infrastructure",
          repoUrl: "#",
          commitMsg: "Add kubernetes deployment configs",
          when: "2d ago",
        },
        {
          shortName: "landing-page",
          repoName: "alexmickelson/landing-page",
          repoUrl: "#",
          commitMsg: "Update styling and add new section",
          when: "3d ago",
        },
        {
          shortName: "api-server",
          repoName: "alexmickelson/api-server",
          repoUrl: "#",
          commitMsg: "Implement authentication middleware",
          when: "5d ago",
        },
        {
          shortName: "data-pipeline",
          repoName: "alexmickelson/data-pipeline",
          repoUrl: "#",
          commitMsg: "Optimize query performance",
          when: "1w ago",
        },
        {
          shortName: "mobile-app",
          repoName: "alexmickelson/mobile-app",
          repoUrl: "#",
          commitMsg: "Add dark mode support",
          when: "1w ago",
        },
        {
          shortName: "cli-tool",
          repoName: "alexmickelson/cli-tool",
          repoUrl: "#",
          commitMsg: "Initial commit",
          when: "2w ago",
        },
      ];

      const mockActivity = [
        {
          icon: "📤",
          title:
            '<a href="#">alex</a> pushed to <a href="#">main</a> at <a href="#">alexmickelson/infrastructure</a>',
          when: "2d ago",
          commits: [
            {
              sha: "a1b2c3d",
              href: "#",
              msg: "Add kubernetes deployment configs",
            },
            { sha: "e4f5g6h", href: "#", msg: "Update docker-compose files" },
          ],
        },
        {
          icon: "📁",
          title:
            '<a href="#">alex</a> created repository <a href="#">alexmickelson/landing-page</a>',
          when: "3d ago",
          commits: [],
        },
        {
          icon: "🔀",
          title:
            '<a href="#">alex</a> merged pull request <a href="#">#42</a> at <a href="#">alexmickelson/api-server</a>',
          when: "5d ago",
          commits: [],
        },
        {
          icon: "📤",
          title:
            '<a href="#">alex</a> pushed to <a href="#">develop</a> at <a href="#">alexmickelson/data-pipeline</a>',
          when: "1w ago",
          commits: [
            { sha: "i7j8k9l", href: "#", msg: "Optimize query performance" },
          ],
        },
        {
          icon: "🟢",
          title:
            '<a href="#">alex</a> closed issue <a href="#">#15</a> at <a href="#">alexmickelson/mobile-app</a>',
          when: "1w ago",
          commits: [],
        },
      ];

      // Render repos
      function renderRepos() {
        const grid = document.getElementById("repo-grid");
        grid.innerHTML = "";

        mockRepos.forEach((repo) => {
          const card = document.createElement("a");
          card.className = "repo-card";
          card.href = repo.repoUrl;
          card.innerHTML = `
          <div class="repo-card-header">
            <span class="repo-icon">📦</span>
            <span class="repo-name">${repo.shortName}</span>
          </div>
          <div class="repo-desc">${repo.repoName}</div>
          <div class="repo-commit">
            <span class="commit-dot"></span>
            <span class="commit-msg">${repo.commitMsg}</span>
            <span class="commit-time">${repo.when}</span>
          </div>
        `;
          grid.appendChild(card);
        });
      }

      // Render activity
      function renderActivity() {
        const feed = document.getElementById("activity-feed");
        feed.innerHTML = "";

        mockActivity.forEach((activity) => {
          const commitsHtml =
            activity.commits.length === 0
              ? ""
              : `<div class="activity-commits">` +
                activity.commits
                  .map(
                    (commit) => `
            <div class="activity-commit-line">
              <a class="activity-commit-sha" href="${commit.href}">${commit.sha}</a>
              <span class="activity-commit-text">${commit.msg}</span>
            </div>
          `,
                  )
                  .join("") +
                `</div>`;

          const item = document.createElement("div");
          item.className = "activity-item";
          item.innerHTML = `
          <div class="activity-op-icon">${activity.icon}</div>
          <div class="activity-body">
            <div class="activity-headline-row">
              <div class="activity-headline">${activity.title}</div>
              <span class="activity-time">${activity.when}</span>
            </div>
            ${commitsHtml}
          </div>
        `;
          feed.appendChild(item);
        });
      }

      // Render heatmap
      function renderHeatmap() {
        const container = document.getElementById("activity-heatmap");

        // Generate random activity data for the past year
        const today = new Date();
        today.setHours(0, 0, 0, 0);

        const startDate = new Date(today);
        startDate.setDate(startDate.getDate() - 52 * 7);
        startDate.setDate(startDate.getDate() - startDate.getDay());

        const counts = new Map();
        for (let i = 0; i < 365; i++) {
          const d = new Date(startDate);
          d.setDate(d.getDate() + i);
          const key = d.toISOString().slice(0, 10);
          // Random activity with some days having more activity
          const rand = Math.random();
          if (rand > 0.3) {
            counts.set(key, Math.floor(Math.random() * 10));
          }
        }

        const cellSize = 11;
        const gap = 2;
        const step = cellSize + gap;
        const cols = 53;
        const rows = 7;
        const padLeft = 28;
        const padTop = 20;
        const svgW = padLeft + cols * step;
        const svgH = padTop + rows * step;

        const LEVELS = ["#2d333b", "#0e4429", "#006d32", "#26a641", "#39d353"];
        const countToLevel = (n) =>
          n === 0 ? 0 : n === 1 ? 1 : n <= 3 ? 2 : n <= 6 ? 3 : 4;

        // Collect month labels
        const monthLabels = new Map();
        let lastMonth = -1;
        for (let col = 0; col < cols; col++) {
          const d = new Date(startDate);
          d.setDate(d.getDate() + col * 7);
          if (d.getMonth() !== lastMonth) {
            lastMonth = d.getMonth();
            monthLabels.set(
              col,
              d.toLocaleString("default", { month: "short" }),
            );
          }
        }

        const ns = "http://www.w3.org/2000/svg";
        const svg = document.createElementNS(ns, "svg");
        svg.setAttribute("width", svgW);
        svg.setAttribute("height", svgH + cellSize + 12);
        svg.setAttribute("class", "heatmap-svg");

        // Month labels
        for (const [col, name] of monthLabels) {
          const t = document.createElementNS(ns, "text");
          t.setAttribute("x", padLeft + col * step);
          t.setAttribute("y", 12);
          t.setAttribute("class", "heatmap-month");
          t.textContent = name;
          svg.appendChild(t);
        }

        // Day labels
        ["Sun", "", "Tue", "", "Thu", "", "Sat"].forEach((label, i) => {
          if (!label) return;
          const t = document.createElementNS(ns, "text");
          t.setAttribute("x", 0);
          t.setAttribute("y", padTop + i * step + cellSize - 2);
          t.setAttribute("class", "heatmap-day");
          t.textContent = label;
          svg.appendChild(t);
        });

        // Day cells
        for (let col = 0; col < cols; col++) {
          for (let row = 0; row < rows; row++) {
            const d = new Date(startDate);
            d.setDate(d.getDate() + col * 7 + row);
            if (d > today) continue;

            const key = d.toISOString().slice(0, 10);
            const count = counts.get(key) || 0;

            const rect = document.createElementNS(ns, "rect");
            rect.setAttribute("x", padLeft + col * step);
            rect.setAttribute("y", padTop + row * step);
            rect.setAttribute("width", cellSize);
            rect.setAttribute("height", cellSize);
            rect.setAttribute("rx", 2);
            rect.setAttribute("fill", LEVELS[countToLevel(count)]);

            const title = document.createElementNS(ns, "title");
            title.textContent =
              count > 0
                ? `${count} activit${count === 1 ? "y" : "ies"} on ${key}`
                : `No activity on ${key}`;
            rect.appendChild(title);
            svg.appendChild(rect);
          }
        }

        // Legend
        const legendY = svgH;
        const legendLabel = document.createElementNS(ns, "text");
        legendLabel.setAttribute("x", padLeft);
        legendLabel.setAttribute("y", legendY + cellSize - 2);
        legendLabel.setAttribute("class", "heatmap-day");
        legendLabel.textContent = "Less";
        svg.appendChild(legendLabel);

        LEVELS.forEach((color, i) => {
          const r = document.createElementNS(ns, "rect");
          r.setAttribute("x", padLeft + 32 + i * step);
          r.setAttribute("y", legendY);
          r.setAttribute("width", cellSize);
          r.setAttribute("height", cellSize);
          r.setAttribute("rx", 2);
          r.setAttribute("fill", color);
          svg.appendChild(r);
        });

        const moreLabel = document.createElementNS(ns, "text");
        moreLabel.setAttribute("x", padLeft + 32 + LEVELS.length * step + 4);
        moreLabel.setAttribute("y", legendY + cellSize - 2);
        moreLabel.setAttribute("class", "heatmap-day");
        moreLabel.textContent = "More";
        svg.appendChild(moreLabel);

        container.innerHTML = "";
        container.appendChild(svg);
      }

      // Initialize on load
      document.addEventListener("DOMContentLoaded", () => {
        renderRepos();
        renderActivity();
        renderHeatmap();
      });
    </script>
  </body>
</html>
