apiVersion: v1
kind: Namespace
metadata:
  name: homepage
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: homepage
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: homepage
  template:
    metadata:
      labels:
        app: homepage
    spec:
      restartPolicy: Always
      containers:
        - name: homepage
          image: ghcr.io/gethomepage/homepage:latest@sha256:a0b71c8e757298d02560186bab9fbe3fc2d375c523a62cc1019177b37e48aa28
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: "server.alexmickelson.guru:3001,home.alexmickelson.guru,gateway.alexmickelson.guru"
          volumeMounts:
            - name: host-configs
              mountPath: /app/config/
      volumes:
        - name: host-configs
          hostPath:
            path: /data/homepage
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: homepage
  namespace: homepage
spec:
  selector:
    app: homepage
  ports:
  - name: http
    protocol: TCP
    port: 3000
    targetPort: 3000
  type: ClusterIP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: homepage-http-route
  namespace: homepage
spec:
  parentRefs:
    - name: envoy-gateway
      namespace: envoy-gateway-ingress
  hostnames:
    - home.alexmickelson.guru
  rules:
    - backendRefs:
        - name: homepage
          port: 3000
      matches:
        - path:
            type: PathPrefix
            value: /
